version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "all"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      test-packages:
        patterns:
          - "bunit"
          - "coverlet.collector"
          - "Microsoft.NET.Test.Sdk"
          - "Moq"
          - "xunit"
          - "xunit.*"
      ui-packages:
        patterns:
          - "MudBlazor"
    commit-message:
      prefix: "[dependabot]"
    labels:
      - "type/chore"
      - "priority/low"
      - "status/in-review"
      - "area/infrastructure"
    assignees:
      - "markheydon"
