name: Validate PowerShell

on:
  push:
    branches:
      - main
    paths:
      - infra/**/*.ps1
      - PSScriptAnalyzerSettings.psd1
  pull_request:
    branches:
      - main
    paths:
      - infra/**/*.ps1
      - PSScriptAnalyzerSettings.psd1

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: validate-powershell-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-powershell:
    name: Lint PowerShell Scripts
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery
          Import-Module PSScriptAnalyzer

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./infra -Settings ./PSScriptAnalyzerSettings.psd1 -Recurse

          if ($results) {
            $results | Format-Table -AutoSize

            $errors = $results | Where-Object Severity -eq 'Error'
            $warnings = $results | Where-Object Severity -eq 'Warning'

            Write-Host "Found $($errors.Count) error(s) and $($warnings.Count) warning(s)."

            if ($errors.Count -gt 0 -or $warnings.Count -gt 0) {
              Write-Error "PSScriptAnalyzer found error(s) or warning(s). Build failed."
              exit 1
            }
          }
          else {
            Write-Host "No PSScriptAnalyzer issues found."
          }
